<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | strip_html | default: site.description | strip_newlines }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="{{ '/index' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/index' | relative_url }}">Home</a>
          <a href="{{ '/architecture' | relative_url }}">Architecture</a>
          <a href="{{ '/runtime-flow' | relative_url }}">Runtime Flow</a>
          <a href="{{ '/module-reference' | relative_url }}">Modules</a>
          <a href="{{ '/mathematics' | relative_url }}">Mathematics</a>
          <a href="{{ '/objective-b-report' | relative_url }}">Objective B</a>
          <a href="{{ '/objective-e-guide' | relative_url }}">Objective E</a>
          <a href="{{ '/demo-guide' | relative_url }}">Doom Demo</a>
        </nav>
      </header>
      <main class="content-card">
        {{ content }}
      </main>
      <footer class="site-footer">
        <p>Assignment 2 documentation site for the current C++ game engine and demo.</p>
      </footer>
    </div>
  </body>
</html>
